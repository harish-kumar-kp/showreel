<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Gallery</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: #111;
    color: #eee;
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    overflow: hidden;
  }
  .stage {
    width: 1540px;
    height: 810px;
    display: flex;
    flex-direction: column;
    padding: 14px;
  }
  h1 {
    font-size: 1rem;
    margin: 0 0 10px 0;
    font-weight: 500;
  }

  .layout {
    flex: 1;
    display: flex;
    gap: 14px;
    min-height: 0;
  }

  /* LEFT: player */
  .player-col {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .player-wrap {
    background: #1b1b1b;
    border-radius: 10px;
    padding: 10px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
  }
  video {
    width: 100%;
    flex: 1;
    min-height: 0;
    background: #000;
    border-radius: 6px;
    display: block;
    object-fit: contain;
  }
  .now-playing {
    margin-top: 8px;
    font-size: 0.78rem;
    color: #aaa;
    flex-shrink: 0;
  }

  /* RIGHT: scrollable thumbnail panel */
  .thumbs-col {
    width: 200px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: #1b1b1b;
    border-radius: 10px;
    padding: 10px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    min-height: 0;
  }
  .thumbs-title {
    font-size: 0.72rem;
    color: #999;
    margin: 2px 2px 8px 2px;
    flex-shrink: 0;
  }
  .thumbs {
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 7px;
    padding-right: 4px;
    min-height: 0;
  }
  .thumbs::-webkit-scrollbar { width: 6px; }
  .thumbs::-webkit-scrollbar-thumb {
    background: #3a3a3a;
    border-radius: 3px;
  }
  .thumbs::-webkit-scrollbar-track { background: transparent; }

  .thumb {
    cursor: pointer;
    border-radius: 6px;
    overflow: hidden;
    border: 2px solid transparent;
    background: #222;
    transition: border-color 0.15s;
    position: relative;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  .thumb:hover { border-color: #4a4a4a; }
  .thumb.active { border-color: #5da9ff; }

  .thumb img {
    width: 64px;
    height: 38px;
    object-fit: cover;
    display: block;
    background: #000;
    flex-shrink: 0;
  }
  .thumb .label {
    font-size: 0.66rem;
    padding: 0 7px;
    color: #ddd;
    line-height: 1.2;
  }
  .thumb .play-icon {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 14px;
    height: 14px;
    background: rgba(0,0,0,0.55);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.5rem;
    color: #fff;
  }
</style>
</head>
<body>

<div class="stage">
  <h1>Video Gallery</h1>

  <div class="layout">
    <div class="player-col">
      <div class="player-wrap">
        <video id="video" controls></video>
        <div class="now-playing" id="nowPlaying">Click a thumbnail on the right to start playing</div>
      </div>
    </div>

    <div class="thumbs-col">
      <div class="thumbs-title">All Videos (25)</div>
      <div class="thumbs" id="thumbs"></div>
    </div>
  </div>
</div>

  const video = document.getElementById('video');
  const nowPlaying = document.getElementById('nowPlaying');
  const thumbsEl = document.getElementById('thumbs');

  videos.forEach((v, i) => {
    const div = document.createElement('div');
    div.className = 'thumb';
    div.innerHTML = `
      <img src="${v.thumb}" alt="${v.title}">
      <div class="play-icon">▶</div>
      <div class="label">${v.title}</div>
    `;
    div.addEventListener('click', () => {
      document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
      div.classList.add('active');
      video.src = v.src;
      video.load();
      video.play().catch(() => {});
      nowPlaying.textContent = "Now playing: " + v.title;
    });
    thumbsEl.appendChild(div);
  });
</script>

</body>
</html>
