  const video = document.getElementById('video');
  const nowPlaying = document.getElementById('nowPlaying');
  const runtimeEl = document.getElementById('runtime');
  const clockEl = document.getElementById('clock');
  const thumbsEl = document.getElementById('thumbs');
  const thumbsCol = document.getElementById('thumbsCol');
  const toggleBtn = document.getElementById('toggleBtn');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const rewindBtn = document.getElementById('rewindBtn');
  const forwardBtn = document.getElementById('forwardBtn');

  playPauseBtn.addEventListener('click', () => {
    if (video.paused) {
      video.play().catch(() => {});
    } else {
      video.pause();
    }
  });
  video.addEventListener('play', () => { playPauseBtn.textContent = '⏸'; });
  video.addEventListener('pause', () => { playPauseBtn.textContent = '▶'; });

  rewindBtn.addEventListener('click', () => {
    video.currentTime = Math.max(0, video.currentTime - 10);
  });
  forwardBtn.addEventListener('click', () => {
    const max = video.duration || Infinity;
    video.currentTime = Math.min(max, video.currentTime + 10);
  });
  function updateClock() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2, '0');
    const m = now.getMinutes().toString().padStart(2, '0');
    const s = now.getSeconds().toString().padStart(2, '0');
    clockEl.textContent = `${h}:${m}:${s}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  function formatTime(seconds) {
    if (!isFinite(seconds) || seconds < 0) seconds = 0;
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return `${m}:${s.toString().padStart(2, '0')}`;
  }

  function updateRuntime() {
    const elapsed = formatTime(video.currentTime);
    const total = video.duration ? formatTime(video.duration) : '--:--';
    runtimeEl.textContent = `${elapsed} / ${total}`;
  }

  video.addEventListener('timeupdate', updateRuntime);
  video.addEventListener('loadedmetadata', updateRuntime);
  video.addEventListener('durationchange', updateRuntime);

  toggleBtn.addEventListener('click', () => {
    const isHidden = thumbsCol.classList.toggle('hidden');
    toggleBtn.textContent = isHidden ? '<<' : '>>';
  });

  videos.forEach((v, i) => {
    const div = document.createElement('div');
    div.className = 'thumb';
    div.innerHTML = `
      <img src="${v.thumb}" alt="${v.title}">
      <div class="play-icon">▶</div>
      <div class="label">${v.title}</div>
    `;
    div.addEventListener('click', () => {
      document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
      div.classList.add('active');
      video.src = v.src;
      video.load();
      video.play().catch(() => {});
      nowPlaying.textContent = "Now playing: " + v.title ;
      runtimeEl.textContent = '0:00 / --:--';
    });
    thumbsEl.appendChild(div);
  });
</script>
