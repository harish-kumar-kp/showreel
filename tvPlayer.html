<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>kOTTe - Its My OTT </title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: #111;
    color: #eee;
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    overflow: hidden;
  }
  .stage {
    width: 978px;
    height: 556px;
    display: flex;
    flex-direction: column;
    padding: 4px;
  }
  h1 {
    font-size: .8rem;
    margin: 0 0 0px 0;
    font-weight: 500;
  }

  .layout {
    flex: 1;
    display: flex;
    gap: 4px;
    min-height: 0;
  }

  /* LEFT: player */
  .player-col {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .toggle-btn {
    position: absolute;
    top: 0px;
    right: 0px;
    z-index: 5;
    background: rgba(0,0,0,0.6);
    color: #eee;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    padding: 5px 9px;
    font-size: 0.68rem;
    cursor: pointer;
  }
  .toggle-btn:hover { background: rgba(0,0,0,0.8); }
  .player-wrap {
    background: #1b1b1b;
    border-radius: 10px;
    padding: 4px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
  }
  video {
    width: 100%;
    flex: 1;
    min-height: 0;
    background: #000;
    border-radius: 6px;
    display: block;
    object-fit: contain;
  }
  .now-playing {
    margin-top: 0px;
    font-size: 0.78rem;
    color: #3fd;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 10px;
    flex-wrap: wrap;
  }
  #nowPlaying {
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .custom-controls {
    display: flex;
    gap: 5px;
    flex-shrink: 0;
  }
  .ctrl-btn {
    background: #2a2a2a;
    color: #eee;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 0.72rem;
    cursor: pointer;
  }
  .ctrl-btn:hover { background: #383838; }
  #runtime {
    color: #5da9ff;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  #clock {
    color: #5da9ff;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }

  /* RIGHT: scrollable thumbnail panel */
  .thumbs-col {
    width: 180px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: #1b1b1b;
    border-radius: 10px;
    padding: 10px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    min-height: 0;
    transition: width 0.2s, padding 0.2s, opacity 0.2s;
    overflow: hidden;
  }
  .thumbs-col.hidden {
    width: 0;
    padding: 10px 0;
    opacity: 0;
    pointer-events: none;
  }
  .thumbs-title {
    font-size: 0.72rem;
    color: #999;
    margin: 2px 2px 8px 2px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .autorun-wrap {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
  }
  .autorun-label {
    font-size: 0.50rem;
    color: #999;
    user-select: none;
  }
  .autorun-switch {
    position: relative;
    width: 24px;
    height: 14px;
    flex-shrink: 0;
    background: #333;
    border: 1px solid #3a3a3a;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .autorun-switch.on {
    background: #2c6b4f;
    border-color: #3a8562;
  }
  .autorun-switch .knob {
    position: absolute;
    top: 1px;
    left: 1px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ccc;
    transition: left 0.15s, background 0.15s;
  }
  .autorun-switch.on .knob {
    left: 13px;
    background: #5da9ff;
  }
  .thumbs {
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 7px;
    padding-right: 4px;
    min-height: 0;
  }
  .thumbs::-webkit-scrollbar { width: 6px; }
  .thumbs::-webkit-scrollbar-thumb {
    background: #3a3a3a;
    border-radius: 3px;
  }
  .thumbs::-webkit-scrollbar-track { background: transparent; }

  .thumb {
    cursor: pointer;
    border-radius: 6px;
    overflow: hidden;
    border: 2px solid transparent;
    background: #222;
    transition: border-color 0.15s;
    position: relative;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  .thumb:hover { border-color: #4a4a4a; }
  .thumb.active { border-color: #5da9ff; }

  .thumb img {
    width: 64px;
    height: 38px;
    object-fit: cover;
    display: block;
    background: #000;
    flex-shrink: 0;
  }
  .thumb .label {
    font-size: 0.66rem;
    padding: 0 7px;
    color: #da8;
    line-height: 1.2;
  }
  .thumb .play-icon {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 14px;
    height: 14px;
    background: rgba(0,0,0,0.55);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.5rem;
    color: #fff;
  }
</style>
</head>
<body>

<div class="stage">
  <h1>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
	  &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
          &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
          &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
          &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
          &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
          &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
          k<font color="Orange">OTT</font>e <font color="violet">- Its My OTT</font>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
          &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Clock <span id="clock"></span></h1>

  <div class="layout">
    <div class="player-col">
      <button class="toggle-btn" id="toggleBtn">></button>
      <div class="player-wrap">
        <video id="video" controls></video>
        <div class="now-playing">
	<span class="custom-controls">
            <button class="ctrl-btn" id="rewindBtn" title="Rewind 10s">⏪</button>
            <button class="ctrl-btn" id="playPauseBtn" title="Play/Pause">▶</button>
            <button class="ctrl-btn" id="forwardBtn" title="Forward 10s">⏩</button>
          </span>
			<span>&nbsp;&nbsp;</span>
         <span id="runtime"></span>
	  <span>&nbsp;&nbsp;&nbsp;</span>
          <span id="nowPlaying">Click a thumbnail on the right to start playing</span>
        </div>
      </div>
    </div>

    <div class="thumbs-col" id="thumbsCol">
      <div class="thumbs-title">
        <span>Browse All Videos</span>
        <span class="autorun-wrap">
          <span class="autorun-label">Autorun</span>
          <span class="autorun-switch on" id="autorunSwitch" title="Toggle autoplay next video"><span class="knob"></span></span>
        </span>
      </div>
      <div class="thumbs" id="thumbs"></div>
    </div>
  </div>
</div>
<script src="VIdOTT/data/data.js"></script>
<script>
 
  const video = document.getElementById('video');
  const nowPlaying = document.getElementById('nowPlaying');
  const runtimeEl = document.getElementById('runtime');
  const clockEl = document.getElementById('clock');
  const thumbsEl = document.getElementById('thumbs');
  const thumbsCol = document.getElementById('thumbsCol');
  const toggleBtn = document.getElementById('toggleBtn');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const rewindBtn = document.getElementById('rewindBtn');
  const forwardBtn = document.getElementById('forwardBtn');

  let currentIndex = -1;
  let thumbEls = [];
  let autorunEnabled = true;

  const autorunSwitch = document.getElementById('autorunSwitch');
  autorunSwitch.addEventListener('click', () => {
    autorunEnabled = !autorunEnabled;
    autorunSwitch.classList.toggle('on', autorunEnabled);
  });

  function playByIndex(i) {
    if (i < 0 || i >= videos.length) return;
    currentIndex = i;
    const v = videos[i];

    thumbEls.forEach(t => t.classList.remove('active'));
    if (thumbEls[i]) {
      thumbEls[i].classList.add('active');
      thumbEls[i].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    video.src = v.src;
    video.load();
    video.play().catch(() => {});
    nowPlaying.textContent = "Now playing: " + v.title;
    runtimeEl.textContent = '0:00 / --:--';
  }

  function playNext() {
    const next = (currentIndex + 1) % videos.length;
    playByIndex(next);
  }

  // Autoplay: when a video finishes, automatically advance to the next one in the playlist
  // (only if the Autorun toggle is switched on).
  video.addEventListener('ended', () => {
    if (autorunEnabled) playNext();
  });

  playPauseBtn.addEventListener('click', () => {
    if (video.paused) {
      video.play().catch(() => {});
    } else {
      video.pause();
    }
  });
  video.addEventListener('play', () => { playPauseBtn.textContent = '⏸'; });
  video.addEventListener('pause', () => { playPauseBtn.textContent = '▶'; });

  rewindBtn.addEventListener('click', () => {
    video.currentTime = Math.max(0, video.currentTime - 10);
  });
  forwardBtn.addEventListener('click', () => {
    const max = video.duration || Infinity;
    video.currentTime = Math.min(max, video.currentTime + 10);
  });
  function updateClock() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2, '0');
    const m = now.getMinutes().toString().padStart(2, '0');
    const s = now.getSeconds().toString().padStart(2, '0');
    clockEl.textContent = `${h}:${m}:${s}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  function formatTime(seconds) {
    if (!isFinite(seconds) || seconds < 0) seconds = 0;
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return `${m}:${s.toString().padStart(2, '0')}`;
  }

  function updateRuntime() {
    const elapsed = formatTime(video.currentTime);
    const total = video.duration ? formatTime(video.duration) : '--:--';
    runtimeEl.textContent = `${elapsed} / ${total}`;
  }

  video.addEventListener('timeupdate', updateRuntime);
  video.addEventListener('loadedmetadata', updateRuntime);
  video.addEventListener('durationchange', updateRuntime);

  toggleBtn.addEventListener('click', () => {
    const isHidden = thumbsCol.classList.toggle('hidden');
    toggleBtn.textContent = isHidden ? '<' : '>';
  });

  videos.forEach((v, i) => {
    const div = document.createElement('div');
    div.className = 'thumb';
    div.innerHTML = `
      <img src="${v.thumb}" alt="${v.title}">
      <div class="play-icon">▶</div>
      <div class="label">${v.title}</div>
    `;
    div.addEventListener('click', () => {
      playByIndex(i);
    });
    thumbsEl.appendChild(div);
    thumbEls.push(div);
  });
</script>

</body>
</html>
