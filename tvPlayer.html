<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: #111;
    color: #eee;
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    overflow: hidden;
  }
  .stage {
    width: 980px;
    height: 560px;
    display: flex;
    flex-direction: column;
    padding: 8px;
  }
  h1 {
    font-size: .8rem;
    margin: 0 0 2px 0;
    font-weight: 400 ;
  }

  .layout {
    flex: 1;
    display: flex;
    gap: 8px;
    min-height: 0;
  }

  /* LEFT: player */
  .player-col {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .player-wrap {
    background: #000000;
    border-radius: 5px;
    padding: 4px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
  }
  video {
    width: 100%;
    flex: 1;
    min-height: 0;
    background: #000000;
    border-radius: 6px;
    display: block;
    object-fit: contain;
  }
  .now-playing {
    margin-top: 3px;
    font-size: 0.8rem;
    color: #aaa;
    flex-shrink: 0;
  }

  /* RIGHT: scrollable thumbnail panel */
  .thumbs-col {
    width: 140px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: #1b1b1b;
    border-radius: 5px;
    padding: 5px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    min-height: 0;
  }
  .thumbs-title {
    font-size: 0.1rem;
    color: #999;
    margin: 2px 2px 8px 2px;
    flex-shrink: 0;
  }
  .thumbs {
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding-right: 2px;
    min-height: 0;
  }
  .thumbs::-webkit-scrollbar { width: 2px; }
  .thumbs::-webkit-scrollbar-thumb {
    background: #3a3a3a;
    border-radius: 2px;
  }
  .thumbs::-webkit-scrollbar-track { background: transparent; }

  .thumb {
    cursor: pointer;
    border-radius: 6px;
    overflow: hidden;
    border: 2px solid transparent;
    background: #222;
    transition: border-color 0.15s;
    position: relative;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  .thumb:hover { border-color: #4a4a4a; }
  .thumb.active { border-color: #5da9ff; }

  .thumb img {
    width: 64px;
    height: 38px;
    object-fit: cover;
    display: block;
    background: #000;
    flex-shrink: 0;
  }
  .thumb .label {
    font-size: 0.66rem;
    padding: 0 7px;
    color: #ddd;
    line-height: 1.2;
  }
  .thumb .play-icon {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 14px;
    height: 14px;
    background: rgba(0,0,0,0.55);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.5rem;
    color: #fff;
  }
</style>

  videos.forEach((v, i) => {
    const div = document.createElement('div');
    div.className = 'thumb';
    div.innerHTML = `
      <img src="${v.thumb}" alt="${v.title}">
      <div class="play-icon">▶</div>
      <div class="label">${v.title}</div>
    `;
    div.addEventListener('click', () => {
      document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
      div.classList.add('active');
      video.src = v.src;
      video.load();
      video.play().catch(() => {});
      nowPlaying.textContent = "Now playing: " + v.title;
    });
    thumbsEl.appendChild(div);
  });
