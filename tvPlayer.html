<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>kOTTe - Its My OTT </title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: #111;
    color: #eee;
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    overflow: hidden;
  }
  .stage {
    width: 978px;
    height: 556px;
    display: flex;
    flex-direction: column;
    padding: 4px;
  }
  h1 {
    font-size: .8rem;
    margin: 0 0 0px 0;
    font-weight: 500;
  }

  .layout {
    flex: 1;
    display: flex;
    gap: 4px;
    min-height: 0;
  }

  /* LEFT: player */
  .player-col {

    min-width: 0;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .toggle-btn {
    position: absolute;
    top: 0px;
    right: 0px;
    z-index: 5;
    background: rgba(0,0,0,0.6);
    color: #eee;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    padding: 5px 9px;
    font-size: 0.68rem;
    cursor: pointer;
  }
  .toggle-btn:hover { background: rgba(0,0,0,0.8); }
  .player-wrap {
    background: #1b1b1b;
    border-radius: 10px;
    padding: 4px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    position: relative;
  }
  video {
    width: 100%;
    flex: 1;
    min-height: 0;
    background: #000;
    border-radius: 6px;
    display: block;
    object-fit: contain;
  }
  .now-playing {
    margin-top: 0px;
    font-size: 0.78rem;
    color: #3fd;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 10px;
    flex-wrap: wrap;
  }
  #nowPlaying {
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .custom-controls {
    display: flex;
    gap: 5px;
    flex-shrink: 0;
  }
  .ctrl-btn {
    background: #2a2a2a;
    color: #eee;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 0.72rem;
    cursor: pointer;
  }
  .ctrl-btn:hover { background: #383838; }
  #runtime {
    color: #5da9ff;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .subtitle-btn {
    background: #2a2a2a;
    color: #aaa;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 0.68rem;
    cursor: pointer;
    flex-shrink: 0;
  }
  .subtitle-btn:hover { background: #383838; color: #eee; }
  .subtitle-btn.on {
    background: #2c5b8f;
    border-color: #5da9ff;
    color: #fff;
  }
  .subtitle-btn.loading {
    background: #2a2a2a;
    border-color: #555;
    color: #888;
    cursor: default;
  }
  .subtitle-btn.unavailable {
    background: #2a2a2a;
    border-color: #6a3a3a;
    color: #a06060;
    cursor: not-allowed;
  }
  .scene-btn {
    background: #2a2a2a;
    color: #aaa;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 0.68rem;
    cursor: pointer;
    flex-shrink: 0;
  }
  .scene-btn:hover { background: #383838; color: #eee; }
  .scene-btn.on {
    background: #2c5b8f;
    border-color: #5da9ff;
    color: #fff;
  }
  .scene-btn:disabled {
    color: #666;
    cursor: not-allowed;
  }
  #scenePanel {
    position: absolute;
    inset: 0;
    background: rgba(10,10,10,0.92);
    z-index: 8;
    display: none;
    flex-direction: column;
    padding: 14px;
    overflow-y: auto;
  }
  #scenePanel.open { display: flex; }
  .scene-panel-title {
    color: #eee;
    font-size: 0.85rem;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .scene-panel-close {
    background: #2a2a2a;
    color: #eee;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    padding: 3px 9px;
    font-size: 0.7rem;

  }
  .scene-panel-close:hover { background: #383838; }
  .scene-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
  }
  .scene-tile {
    cursor: pointer;
    border-radius: 6px;

  .scene-tile:hover { border-color: #5da9ff; }
  .scene-tile .scene-thumb {
    width: 100%;
    aspect-ratio: 16 / 9;

  .scene-tile .scene-time {

  .xray-thumb {

  }
  .xray-thumb img {
    width: 100%;
    display: block;
  }
  .xray-content {
    flex: 1;

  }
  .xray-title {
    font-size: 1.05rem;

    color: #fff;

  /* Aspect ratio / fit modes for the video element.
     Attribute selector gives higher specificity than the base `video` rule. */
  video[data-ratio="fit"] {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  video[data-ratio="fill"] {
    width: 100%;
    height: 100%;
    object-fit: fill;
  }
  video[data-ratio="zoom"] {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  video[data-ratio="16:9"] {
    flex: 0 1 auto;
    width: 100%;
    height: auto;
    max-height: 100%;
    aspect-ratio: 16 / 9;
    object-fit: contain;
    margin: auto;
  }
  video[data-ratio="4:3"] {
    flex: 0 1 auto;
    width: auto;
    height: 100%;
    max-width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: contain;
    margin: auto;
  }
  video[data-ratio="squeeze"] {
    width: 100%;
    height: 100%;
    object-fit: contain;
    transform: scaleY(0.82);
    transform-origin: center center;
  }
  #clock {

    font-variant-numeric: tabular-nums;

  /* RIGHT: scrollable thumbnail panel */

    background: #1b1b1b;

    font-size: 0.72rem;

  .autorun-switch.on {

    left: 1px;

    height: 10px;
    border-radius: 50%;
    background: #ccc;

  .thumbs {

    flex-direction: column;

  .thumbs::-webkit-scrollbar-track { background: transparent; }

  .thumb {
    cursor: pointer;
    border-radius: 6px;
    overflow: hidden;
    border: 2px solid transparent;
    background: #222;
    transition: border-color 0.15s;
    position: relative;
    display: flex;
    align-items: center;
    flex-shrink: 0;

  .thumb:hover { border-color: #4a4a4a; }
  .thumb.active { border-color: #5da9ff; }

  .thumb img {

    background: #000;

  .thumb .label {

  .thumb .play-icon {

    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.5rem;
    color: #fff;
  }

<body>
<script src="VIdOTT/data/data.js"></script>
<div class="stage">

          </span>

	<span class="aspect-controls" id="aspectControls">
            <button class="aspect-btn active" data-ratio="fit" title="Fit to player">Fit</button>
            <button class="aspect-btn" data-ratio="fill" title="Stretch to fill">Fill</button>
            <button class="aspect-btn" data-ratio="zoom" title="Zoom / crop">Zoom</button>
            <button class="aspect-btn" data-ratio="16:9" title="Lock to 16:9">16:9</button>
            <button class="aspect-btn" data-ratio="4:3" title="Lock to 4:3">4:3</button>
            <button class="aspect-btn" data-ratio="squeeze" title="Squeeze height to 75%">2.35:1</button>
          </span> 
        <span>&nbsp;&nbsp;</span>

    <div class="thumbs-col" id="thumbsCol">

        <span class="autorun-wrap">
          <span class="autorun-label">Autorun</span>

<script>
  
  const video = document.getElementById('video');
  const nowPlaying = document.getElementById('nowPlaying');
  const runtimeEl = document.getElementById('runtime');
  const clockEl = document.getElementById('clock');
  const thumbsEl = document.getElementById('thumbs');
  const thumbsCol = document.getElementById('thumbsCol');
  const toggleBtn = document.getElementById('toggleBtn');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const rewindBtn = document.getElementById('rewindBtn');
  const forwardBtn = document.getElementById('forwardBtn');
  const aspectControls = document.getElementById('aspectControls');
  const aspectBtns = aspectControls.querySelectorAll('.aspect-btn');
  const subtitleBtn = document.getElementById('subtitleBtn');
  const subtitleOverlay = document.getElementById('subtitleOverlay');
  const sceneBtn = document.getElementById('sceneBtn');
  const scenePanel = document.getElementById('scenePanel');
  const sceneGrid = document.getElementById('sceneGrid');
  const sceneCloseBtn = document.getElementById('sceneCloseBtn');
  const xrayBtn = document.getElementById('xrayBtn');
  const xrayPanel = document.getElementById('xrayPanel');
  const xrayBody = document.getElementById('xrayBody');
  const xrayCloseBtn = document.getElementById('xrayCloseBtn');

  // ---- Subtitles (.srt) — fail-proof loader ----
  let subtitleCues = [];      // [{start, end, text}]
  let subtitlesEnabled = true;
  let subtitleLoadToken = 0;  // guards against stale/late fetches overwriting a newer selection

  function srtTimeToSeconds(t) {
    const m = t.trim().match(/(\d+):(\d+):(\d+)[,.](\d+)/);
    if (!m) return 0;
    const [, h, min, s, ms] = m;
    return (+h) * 3600 + (+min) * 60 + (+s) + (+ms) / 1000;
  }

  function escapeHTML(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function parseSRT(raw) {
    if (!raw) return [];
    // Strip BOM, normalize line endings
    let text = raw.replace(/^\uFEFF/, '').replace(/\r\n?/g, '\n');

    // Primary strategy: regex-match "index? \n timestamp --> timestamp \n text..."
    // Works even if blank-line separators between blocks are missing/irregular.
    const cueRegex = /(?:^|\n)\s*\d*\s*\n?\s*(\d{1,2}:\d{2}:\d{2}[,.]\d{1,3})\s*-{2,3}>\s*(\d{1,2}:\d{2}:\d{2}[,.]\d{1,3})[^\n]*\n([\s\S]*?)(?=\n\s*\d+\s*\n\s*\d{1,2}:\d{2}:\d{2}[,.]\d{1,3}\s*-{2,3}>|$)/g;

    const cues = [];
    let match;
    while ((match = cueRegex.exec(text)) !== null) {
      const start = srtTimeToSeconds(match[1]);
      const end = srtTimeToSeconds(match[2]);
      const cueText = match[3]
        .split('\n')
        .map(l => l.trim())
        .filter(l => l !== '')
        .join('\n')
        .replace(/<[^>]+>/g, ''); // strip <i>, <b>, <font> etc.
      if (cueText && end > start) cues.push({ start, end, text: cueText });
    }

    // Fallback strategy: blank-line block split (older/simpler parser)
    // Used only if the regex above found nothing, e.g. unusual formatting.
    if (cues.length === 0) {
      const blocks = text.split(/\n\s*\n/);
      for (const block of blocks) {
        const lines = block.split('\n').filter(l => l.trim() !== '');
        if (lines.length < 2) continue;
        let idx = /^\d+$/.test(lines[0].trim()) ? 1 : 0;
        const timeMatch = (lines[idx] || '').match(/([\d:,.]+)\s*-{2,3}>\s*([\d:,.]+)/);
        if (!timeMatch) continue;
        const start = srtTimeToSeconds(timeMatch[1]);
        const end = srtTimeToSeconds(timeMatch[2]);
        const cueText = lines.slice(idx + 1).join('\n').replace(/<[^>]+>/g, '');
        if (cueText && end > start) cues.push({ start, end, text: cueText });
      }
    }

    cues.sort((a, b) => a.start - b.start);
    return cues;
  }

  function fetchWithTimeout(url, ms) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), ms);
    return fetch(url, { signal: controller.signal, cache: 'no-store' })
      .finally(() => clearTimeout(timer));
  }

  function setSubtitleStatus(state) {
    // state: 'on' | 'off' | 'loading' | 'unavailable'
    subtitleBtn.classList.remove('on', 'loading', 'unavailable');
    if (state === 'on') {
      subtitleBtn.classList.add('on');
      subtitleBtn.textContent = 'CC';
      subtitleBtn.title = 'Subtitles on — click to turn off';
      subtitleBtn.disabled = false;
    } else if (state === 'off') {
      subtitleBtn.textContent = 'CC';
      subtitleBtn.title = 'Subtitles off — click to turn on';
      subtitleBtn.disabled = false;
    } else if (state === 'loading') {
      subtitleBtn.classList.add('loading');
      subtitleBtn.textContent = 'CC…';
      subtitleBtn.title = 'Loading subtitles…';
      subtitleBtn.disabled = true;
    } else if (state === 'unavailable') {
      subtitleBtn.classList.add('unavailable');
      subtitleBtn.textContent = 'CC';
      subtitleBtn.title = 'Subtitles unavailable for this title';
      subtitleBtn.disabled = true;
    }
  }

  async function loadSubtitles(source) {
    const token = ++subtitleLoadToken;
    subtitleCues = [];
    subtitleOverlay.textContent = '';

    // Normalize input: allow a single URL string or an array of mirror URLs
    const urls = !source ? [] : (Array.isArray(source) ? source : [source]);
    if (urls.length === 0) {
      setSubtitleStatus('off');
      subtitleBtn.disabled = true;
      subtitleBtn.title = 'No subtitles available for this title';
      return;
    }

    setSubtitleStatus('loading');

    let lastError = null;
    for (const url of urls) {
      try {
        const res = await fetchWithTimeout(url, 8000);
        if (token !== subtitleLoadToken) return; // a newer video was selected meanwhile
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        const cues = parseSRT(text);
        if (cues.length === 0) throw new Error('No cues parsed from file');
        if (token !== subtitleLoadToken) return;
        subtitleCues = cues;
        setSubtitleStatus(subtitlesEnabled ? 'on' : 'off');
        return; // success — stop trying further mirrors
      } catch (err) {
        lastError = err;
        console.warn('Subtitle mirror failed, trying next if available:', url, err);
      }
    }

    if (token !== subtitleLoadToken) return;
    console.warn('All subtitle sources failed:', lastError);
    setSubtitleStatus('unavailable');
  }

  function updateSubtitleDisplay() {
    if (!subtitlesEnabled || subtitleCues.length === 0) {
      subtitleOverlay.textContent = '';
      return;
    }
    const t = video.currentTime;
    const cue = subtitleCues.find(c => t >= c.start && t <= c.end);
    subtitleOverlay.innerHTML = cue ? `<span>${escapeHTML(cue.text).replace(/\n/g, '<br>')}</span>` : '';
  }

  subtitleBtn.addEventListener('click', () => {
    if (subtitleBtn.disabled) return;
    subtitlesEnabled = !subtitlesEnabled;
    setSubtitleStatus(subtitlesEnabled ? 'on' : 'off');
    if (!subtitlesEnabled) subtitleOverlay.textContent = '';
  });
  setSubtitleStatus('off');

  video.addEventListener('timeupdate', updateSubtitleDisplay);

  // ---- Scene selection: regular-interval jump points across the whole title ----
  let sceneList = [];             // [{time}]
  let sceneToken = 0;             // guards against a stale build overwriting a newer video
  let sceneThumbsUsable = true;   // flips false the first time canvas capture is blocked (CORS)
  let sceneThumbsGenerated = false; // guards against starting a duplicate capture pass
  let hiddenCaptureVideo = null;

  function formatSceneTime(seconds) {
    seconds = Math.max(0, Math.floor(seconds));
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    const mm = h > 0 ? m.toString().padStart(2, '0') : m;
    const ss = s.toString().padStart(2, '0');
    return h > 0 ? `${h}:${mm}:${ss}` : `${mm}:${ss}`;
  }

  function pickSceneInterval(duration) {
    // Aim for a manageable number of tiles (roughly 8–20) regardless of runtime,
    // snapped to a friendly interval so scene points fall on round-ish times.
    const targetCount = 14;
    const rawInterval = duration / targetCount;
    const steps = [30, 60, 120, 180, 300, 420, 600, 900, 1200, 1800, 2700, 3600];
    let interval = steps[steps.length - 1];
    for (const s of steps) { if (rawInterval <= s) { interval = s; break; } }
    return interval;
  }

  function buildSceneList(duration, v) {
    sceneList = [];
    // If the playlist entry supplies its own scene list (time + thumbnail URL
    // pairs, e.g. pre-extracted with ffmpeg and hosted alongside the videos),
    // use that directly — it's the only way to guarantee real thumbnails,
    // since most video hosts don't send the CORS headers live capture needs.
    if (v && Array.isArray(v.scenes) && v.scenes.length > 0) {
      sceneList = v.scenes.map(s => ({ time: s.time, thumb: s.thumb || null }));
      return;
    }
    if (!duration || !isFinite(duration) || duration <= 0) return;
    const interval = pickSceneInterval(duration);
    for (let t = 0; t < duration; t += interval) {
      sceneList.push({ time: t, thumb: null });
    }
    if (sceneList.length === 0) sceneList.push({ time: 0, thumb: null });
  }

  function renderSceneGrid() {
    sceneGrid.innerHTML = '';
    if (sceneList.length === 0) {
      sceneGrid.innerHTML = '<div class="scene-empty">Scenes will appear once the video starts loading.</div>';
      return;
    }
    sceneList.forEach((scene, idx) => {
      const tile = document.createElement('div');
      tile.className = 'scene-tile';
      const bg = scene.thumb ? ` style="background-image:url('${scene.thumb}')"` : '';
      tile.innerHTML = `
        <div class="scene-thumb" id="sceneThumb${idx}"${bg}>${scene.thumb ? '' : '▶'}</div>
        <div class="scene-time">${formatSceneTime(scene.time)}</div>
      `;
      tile.addEventListener('click', () => {
        video.currentTime = scene.time;
        video.play().catch(() => {});
        closeScenePanel();
      });
      sceneGrid.appendChild(tile);
    });
  }

  function openScenePanel() {
    scenePanel.classList.add('open');
    sceneBtn.classList.add('on');
    // (Re)build in case the duration wasn't known yet the first time the button was clicked.
    if (sceneList.length === 0 && video.duration) {
      buildSceneList(video.duration, videos[currentIndex]);
      renderSceneGrid();
    }
    // Only attempt live capture for scenes that don't already have a real thumbnail.
    generateSceneThumbnails();
  }
  function closeScenePanel() {
    scenePanel.classList.remove('open');
    sceneBtn.classList.remove('on');
  }
  sceneBtn.addEventListener('click', () => {
    if (scenePanel.classList.contains('open')) closeScenePanel();
    else openScenePanel();
  });
  sceneCloseBtn.addEventListener('click', closeScenePanel);

  // ---- X-Ray: short movie info pulled live from Wikipedia's public REST API ----
  // Wikipedia summaries are released under CC BY-SA and are explicitly meant for
  // this kind of "info card" reuse; we always show a link back to the full
  // article for attribution rather than displaying more than a short extract.
  const xrayCache = {}; // videoIndex -> { title, extract, thumb, pageUrl } | 'unavailable'
  let xrayToken = 0;

  function cleanTitleForSearch(title) {
    return title
      .replace(/-Short\.?/gi, '')
      .replace(/-Doc\.?/gi, '')
      .replace(/^Making[- ]/i, '')
      .replace(/\s+/g, ' ')
      .trim();
  }

  async function fetchWikipediaInfo(v) {
    // An explicit `wiki` field (exact article title) always wins and skips the search step.
    if (v.wiki) {
      return fetchWikipediaSummary(v.wiki);
    }
    const query = cleanTitleForSearch(v.title);
    const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query + ' film')}&format=json&origin=*`;
    const res = await fetchWithTimeout(searchUrl, 8000);
    if (!res.ok) throw new Error('search HTTP ' + res.status);
    const data = await res.json();
    const hit = data && data.query && data.query.search && data.query.search[0];
    if (!hit) throw new Error('no search results');
    return fetchWikipediaSummary(hit.title);
  }

  async function fetchWikipediaSummary(pageTitle) {
    const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(pageTitle.replace(/ /g, '_'))}`;
    const res = await fetchWithTimeout(url, 8000);
    if (!res.ok) throw new Error('summary HTTP ' + res.status);
    const data = await res.json();
    if (!data.extract) throw new Error('no extract');
    return {
      title: data.title || pageTitle,
      extract: data.extract,
      thumb: (data.thumbnail && data.thumbnail.source) || (data.originalimage && data.originalimage.source) || null,
      pageUrl: (data.content_urls && data.content_urls.desktop && data.content_urls.desktop.page)
        || `https://en.wikipedia.org/wiki/${encodeURIComponent(pageTitle.replace(/ /g, '_'))}`
    };
  }

  function renderXray(state) {
    if (state === 'loading') {
      xrayBody.innerHTML = '<div class="xray-status">Looking this up on Wikipedia…</div>';
      return;
    }
    if (state === 'unavailable' || !state) {
      xrayBody.innerHTML = '<div class="xray-status">No Wikipedia info found for this title.</div>';
      return;
    }
    const thumbHtml = state.thumb
      ? `<div class="xray-thumb"><img src="${state.thumb}" alt="${state.title}"></div>`
      : '';
    xrayBody.innerHTML = `
      ${thumbHtml}
      <div class="xray-content">
        <div class="xray-title">${state.title}</div>
        <div class="xray-extract">${state.extract}</div>
        <div class="xray-attribution">Summary from <a href="${state.pageUrl}" target="_blank" rel="noopener">Wikipedia</a> · CC BY-SA</div>
      </div>
    `;
  }

  async function loadXrayInfo() {
    const idx = currentIndex;
    if (idx < 0) return;
    if (xrayCache[idx]) {
      renderXray(xrayCache[idx] === 'unavailable' ? null : xrayCache[idx]);
      return;
    }
    const token = ++xrayToken;
    renderXray('loading');
    try {
      const info = await fetchWikipediaInfo(videos[idx]);
      if (token !== xrayToken) return; // a different video was selected meanwhile
      xrayCache[idx] = info;
      renderXray(info);
    } catch (err) {
      console.warn('X-Ray lookup failed:', err);
      if (token !== xrayToken) return;
      xrayCache[idx] = 'unavailable';
      renderXray(null);
    }
  }

  function openXrayPanel() {
    xrayPanel.classList.add('open');
    xrayBtn.classList.add('on');
    loadXrayInfo();
  }
  function closeXrayPanel() {
    xrayPanel.classList.remove('open');
    xrayBtn.classList.remove('on');
  }
  xrayBtn.addEventListener('click', () => {
    if (xrayPanel.classList.contains('open')) closeXrayPanel();
    else openXrayPanel();
  });
  xrayCloseBtn.addEventListener('click', closeXrayPanel);

  // Best-effort thumbnail capture: uses a hidden, muted clone of the current video
  // to grab a frame at each scene's timestamp without disturbing playback. Only
  // used for scenes that don't already have a pre-supplied `thumb` URL. Many video
  // hosts don't send CORS headers, which taints the canvas — the moment that
  // happens we stop trying and just leave the plain time-labeled tiles in place.
  function ensureHiddenCaptureVideo() {
    if (hiddenCaptureVideo) return hiddenCaptureVideo;
    const v = document.createElement('video');
    v.crossOrigin = 'anonymous';
    v.muted = true;
    v.preload = 'metadata';
    v.style.display = 'none';
    document.body.appendChild(v);
    hiddenCaptureVideo = v;
    return v;
  }

  async function generateSceneThumbnails() {
    if (!sceneThumbsUsable || sceneList.length === 0 || sceneThumbsGenerated) return;
    // Nothing to capture if every scene already has a real, pre-supplied thumbnail.
    if (sceneList.every(s => s.thumb)) return;
    sceneThumbsGenerated = true;
    const token = sceneToken;
    const src = videos[currentIndex] && videos[currentIndex].src;
    if (!src) return;

    const capture = ensureHiddenCaptureVideo();
    capture.src = src;

    const canvas = document.createElement('canvas');
    canvas.width = 160;
    canvas.height = 90;
    const ctx = canvas.getContext('2d');

    for (let idx = 0; idx < sceneList.length; idx++) {
      if (token !== sceneToken) return; // a different video was selected meanwhile
      const scene = sceneList[idx];
      if (scene.thumb) continue; // already has a real thumbnail, skip capture
      try {
        await new Promise((resolve, reject) => {
          const onSeeked = () => { cleanup(); resolve(); };
          const onError = () => { cleanup(); reject(new Error('capture video error')); };
          function cleanup() {
            capture.removeEventListener('seeked', onSeeked);
            capture.removeEventListener('error', onError);
          }
          capture.addEventListener('seeked', onSeeked, { once: true });
          capture.addEventListener('error', onError, { once: true });
          capture.currentTime = scene.time;
        });
        if (token !== sceneToken) return;
        ctx.drawImage(capture, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.6); // throws if canvas is tainted
        const thumbEl = document.getElementById(`sceneThumb${idx}`);
        if (thumbEl) {
          thumbEl.style.backgroundImage = `url(${dataUrl})`;
          thumbEl.textContent = '';
        }
      } catch (err) {
        console.warn('Scene thumbnail capture unavailable for this source (likely no CORS headers on the video host), keeping time-only tiles:', err);
        sceneThumbsUsable = false;
        return;
      }
    }
  }

  aspectBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      video.setAttribute('data-ratio', btn.dataset.ratio);
      aspectBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  let currentIndex = -1;
  let thumbEls = [];
  let autorunEnabled = true;

  const autorunSwitch = document.getElementById('autorunSwitch');
  autorunSwitch.addEventListener('click', () => {
    autorunEnabled = !autorunEnabled;
    autorunSwitch.classList.toggle('on', autorunEnabled);
  });

  function playByIndex(i, isRetry) {
    if (i < 0 || i >= videos.length) return;
    currentIndex = i;
    const v = videos[i];

    thumbEls.forEach(t => t.classList.remove('active'));
    if (thumbEls[i]) {
      thumbEls[i].classList.add('active');
      thumbEls[i].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    video.src = v.src;
    video.load();
    video.play().catch(() => {});
    nowPlaying.textContent = "Now playing: " + v.title;
    runtimeEl.textContent = '0:00 / --:--';
    loadSubtitles(v.subtitle);
    if (!isRetry) videoRetried = false;

    // Reset scene selection for the new title; the actual list is (re)built once
    // duration is known, via the loadedmetadata listener below.
    sceneToken++;
    sceneThumbsUsable = true;
    sceneThumbsGenerated = false;
    sceneList = [];
    closeScenePanel();
    renderSceneGrid();
    closeXrayPanel();
  }

  function playNext() {
    const next = (currentIndex + 1) % videos.length;
    playByIndex(next);
  }

  // Fail-proof playback: if a source errors out (bad URL, network drop, unsupported
  // codec, etc.) retry it once, then fall back to the next playlist item rather than
  // leaving the player stuck on a black screen.
  let videoRetried = false;
  video.addEventListener('error', () => {
    const v = videos[currentIndex];
    if (!v) return;
    if (!videoRetried) {
      videoRetried = true;
      nowPlaying.textContent = `Playback error — retrying "${v.title}"…`;
      setTimeout(() => playByIndex(currentIndex, true), 1200);
    } else {
      nowPlaying.textContent = `Couldn't play "${v.title}" — skipping to next.`;
      setTimeout(playNext, 1500);
    }
  });

  // Autoplay: when a video finishes, automatically advance to the next one in the playlist
  // (only if the Autorun toggle is switched on).
  video.addEventListener('ended', () => {
    if (autorunEnabled) playNext();
  });

  playPauseBtn.addEventListener('click', () => {
    if (video.paused) {
      video.play().catch(() => {});
    } else {
      video.pause();
    }
  });
  video.addEventListener('play', () => { playPauseBtn.textContent = '⏸'; });
  video.addEventListener('pause', () => { playPauseBtn.textContent = '▶'; });

  rewindBtn.addEventListener('click', () => {
    video.currentTime = Math.max(0, video.currentTime - 10);
  });
  forwardBtn.addEventListener('click', () => {
    const max = video.duration || Infinity;
    video.currentTime = Math.min(max, video.currentTime + 10);
  });
  function updateClock() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2, '0');
    const m = now.getMinutes().toString().padStart(2, '0');
    const s = now.getSeconds().toString().padStart(2, '0');
    clockEl.textContent = `${h}:${m}:${s}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  function formatTime(seconds) {
    if (!isFinite(seconds) || seconds < 0) seconds = 0;
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return `${m}:${s.toString().padStart(2, '0')}`;
  }

  function updateRuntime() {
    const elapsed = formatTime(video.currentTime);
    const total = video.duration ? formatTime(video.duration) : '--:--';
    runtimeEl.textContent = `${elapsed} / ${total}`;
  }

  video.addEventListener('timeupdate', updateRuntime);
  video.addEventListener('loadedmetadata', updateRuntime);
  video.addEventListener('durationchange', updateRuntime);

  video.addEventListener('loadedmetadata', () => {
    if (sceneList.length === 0 && video.duration) {
      buildSceneList(video.duration, videos[currentIndex]);
      renderSceneGrid();
    }
  });

  toggleBtn.addEventListener('click', () => {
    const isHidden = thumbsCol.classList.toggle('hidden');
    toggleBtn.textContent = isHidden ? '<' : '>';
  });

  videos.forEach((v, i) => {
    const div = document.createElement('div');
    div.className = 'thumb';
    div.innerHTML = `
      <img src="${v.thumb}" alt="${v.title}">
      <div class="play-icon">▶</div>
      <div class="label">${v.title}</div>
    `;
    div.addEventListener('click', () => {
      playByIndex(i);
    });
    thumbsEl.appendChild(div);
    thumbEls.push(div);
  });
</script>

</body>
</html>
